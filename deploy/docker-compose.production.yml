services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agent_hub
      POSTGRES_PASSWORD: ${AGENT_HUB_POSTGRES_PASSWORD:?set AGENT_HUB_POSTGRES_PASSWORD in /etc/agent-hub/agent-hub.env and pass --env-file}
      POSTGRES_DB: agent_hub
    volumes:
      - agent-hub-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_hub -d agent_hub"]
      interval: 10s
      timeout: 5s
      retries: 12

  agent-hub:
    image: agent-hub:local
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${AGENT_HUB_ENV_FILE:-/etc/agent-hub/agent-hub.env}
    environment:
      NODE_ENV: production
      AGENT_HUB_HOST: 0.0.0.0
      AGENT_HUB_PORT: 8788
      DATABASE_URL: postgres://agent_hub:${AGENT_HUB_POSTGRES_PASSWORD:?set AGENT_HUB_POSTGRES_PASSWORD in /etc/agent-hub/agent-hub.env and pass --env-file}@postgres:5432/agent_hub
    ports:
      - "8788:8788"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-lc", "npm run db:migrate -w @agent-hub/server && npm run start -w @agent-hub/server"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8788/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  agent-hub-postgres-data:
